# Administración I · Parcial 1

## Unidad 1. Administración
### 1. Concepto
- Del latín ad + minister
- Medio para un fin
- Administra recursos para lograr objetivos
- Proceso repetitivo y retroalimentado

### 2. Ciencia, técnica y arte
- Ciencia
  - Investiga, explica, predice
  - Hipótesis, teorías, leyes, modelos
  - Objeto: organizaciones
- Técnica
  - Transforma y opera la realidad
  - Reglas, normas, procedimientos
  - Valida la ciencia
- Arte
  - Subjetivo, vivencial, individual
  - Personalidad del administrador

### 3. Ciclo administrativo
- Planificación
  - Qué, cuándo, cómo, quién
  - Objetivos: corto, mediano, remoto
  - Generales y específicos
  - Coherencia vertical y horizontal
  - Tipos de planes
    - Procedimientos (flujogramas)
    - Presupuestos (dinero)
    - Cronogramas (tiempo)
    - Normas (comportamiento)
- Organización
  - Tareas
  - Personas
  - Órganos (áreas)
  - Relaciones
- Dirección
  - Poner a funcionar
  - Autoridad vs Poder
  - Tipos de poder
    - Recompensa
    - Coercitivo
    - Legitimado
    - Referencia
    - Experto
  - Principios
    - Unidad de mando
    - Delegación
    - Amplitud de control
    - Coordinación
  - Niveles
    - Institucional (directores)
    - Intermedio (gerentes)
    - Operacional (supervisores)
- Control
  - Estándar
  - Observación de desempeño
  - Acción correctiva
  - Tipos de estándar
    - Cantidad
    - Calidad
    - Tiempo
    - Costo

### 4. Escuelas
- Clásica (1841-1925)
  - Taylor (Científica)
    - Eficiencia del trabajador
    - Selección por cualidades físicas
    - Remuneración por rendimiento
  - Fayol (Clásica)
    - Sistematiza la administración
    - Divide en áreas
    - 14 principios
- Burocrática (1910-1950)
  - Weber
    - Normas legales
    - Comunicación formal
    - Impersonalidad
    - Jerarquía
- Relaciones Humanas (1925-1935)
  - Mayo
    - Hawthorne
    - Hombre como ser social
    - Líder y grupo
    - Org formal e informal
- Sociología y Psicología (1935-1950)
  - Maslow + McGregor
    - Pirámide necesidades
    - Teoría X e Y
    - Tipos de participación
- Sistemas (1950-1970)
  - Org como todo interrelacionado
  - Subsistemas
  - Importancia del entorno
- Estratégica (1970+)
  - Pensamiento estratégico
  - Planificación a largo plazo

## Unidad 2. La Organización
### 1. Concepto
- Unidades sociales
- Constituidas para fines específicos
- Características
  - División del trabajo
  - Centros de poder
  - Sustitución de personal

### 2. Tipos
- Por origen del capital
  - Nacional
  - Extranjera
  - Mixta
- Por sistema de autoridad
  - Autoritarias
  - Participativas
- Por objetivos
  - Con fines de lucro
  - Sin fines de lucro
- Por composición del capital
  - Públicas
  - Privadas
  - Mixtas

### 3. Sistema abierto
- Entrada
  - Materia prima
  - Información
  - Expectativas
- Proceso
  - Tareas
  - Relaciones interpersonales
  - Estructura
  - Cultura organizacional
- Salida
  - Productos
  - Servicios
- Causalidad recíproca
  - Entorno → organización
  - Organización → entorno

### 4. Variables del entorno
- Microentorno (directo)
  - Clientes
  - Competidores
  - Proveedores
  - Sector económico
  - Sindicatos
  - Sistemas financieros
  - Grupos presión directa
- Macroentorno (indirecto)
  - Sociedad
  - Tecnología
  - Factores culturales
  - Factores económicos
  - Factores políticos
  - Grupos presión indirecta

## Unidad 3. Estructuras Orgánicas
### 1. Diseño organizacional
- Único y específico
- Define estructura funcional
- Ubicación de cada agente
- Relaciones de autoridad

### 2. Principios
- Unidad de mando
- Delegación (acción no responsabilidad)
- Amplitud de control
- Coordinación

### 3. Relaciones formales
- Lineal (escalar)
  - Líneas directas jefe-subordinado
  - Centralización decisiones
  - Configuración piramidal
- Funcional (especialización)
  - Autoridad parcial
  - Por especialidad
  - Comunicación directa
- Staff (asesoría)
  - Combina lineal y funcional
  - Asesora pero no ordena
  - Consultoría y recomendación

### 4. Departamentalización
- Por funciones
- Por área geográfica
- Por tiempo
- Por proceso
- Por producto
- Matricial

### 5. Centralización vs Descentralización
- Centralización
  - Cúpula decide
  - Coherencia
  - Lenta
- Descentralización
  - Niveles bajos deciden
  - Rápida
  - Riesgo de inconsistencia
- Factores
  - Costo de la decisión
  - Tamaño organización
  - Estilo liderazgo
  - Calidad información
  - Capacidad gerentes
  - Contexto
